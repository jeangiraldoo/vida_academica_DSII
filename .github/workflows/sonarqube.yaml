name: SonarQube analysis
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarqubeScanFrontend:
    name: SonarQubeScan1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: install deps
        run: npm install
        working-directory: client

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: client

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: client
          args: |
            -Dsonar.projectKey=jeangiraldoo_vida_academica_DSII
            -Dsonar.organization=jeangiraldoo
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,src/test/**,vite.config.ts,src/main.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  sonarqubeScanBackend:
    name: SonarQubeScan2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: server
          args: |
            -Dsonar.projectKey=jeangiraldoo_vida_academica_DSII
            -Dsonar.organization=jeangiraldoo
